name: Governance Advisory

on:
  pull_request:
    paths:
      - 'tools/codex-governance/**'
  push:
    branches:
      - codex/**
    paths:
      - 'tools/codex-governance/**'

permissions:
  contents: read

jobs:
  verify:
    name: Advisory verification
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: tools/codex-governance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Run deterministic checks
        run: |
          make test
          make vet
          make build
          make smoke-ticket-plan
          git diff --check
          go run ./cmd/codex-governance roadmap check --roadmap docs/roadmaps/ticket-planning-and-jira-creation.yaml
