format_version: 1
profile: generic
jira:
    project: REK
    issue_key_pattern: ^[A-Z][A-Z0-9]+-[0-9]+$
    required_sections:
        - Scope
        - Non-Goals
        - Technical Acceptance Criteria
        - Validation Plan
review_budget:
    max_changed_files: 20
    max_changed_lines: 800
    max_components: 2
ci:
    provider: github-actions
    mode: warn
upstream:
    release: ""
    source_commit: ""
    format_version: 0
implementation:
    allowed_adapters:
        - headless-codex
    local_code_edit_enabled: false
signing:
    format_version: 1
    trusted_keys:
        - key_id: sha256:d449c1e0fca7d
          role: export-issuer
          algorithm: ed25519
          public_key: hQWB+oognVrOvQzpmY7cYU5DmyJ3I3QDm89zI7WGMXM=
        - key_id: sha256:8d89b947abd59
          role: repository-owner
          algorithm: ed25519
          public_key: d+m21Pp2KWzUUdvXNKRtdkIBQCuNkNyX+hwmPBw/kbs=
        - key_id: sha256:1bedcdd81ed85
          role: technical-owner
          algorithm: ed25519
          public_key: +OtVApejZjGkeynkx8xFCECni0okdUIwe/5+CDkczVQ=
    offline_export_max_age: 24h
