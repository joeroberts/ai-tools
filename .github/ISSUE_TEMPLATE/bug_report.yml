name: Bug report
description: Report a reproducible problem in this repository.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: "Do not include vulnerability details, credentials, or tokens. Use private vulnerability reporting for security issues."
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Give the smallest deterministic steps, inputs, and environment details.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
