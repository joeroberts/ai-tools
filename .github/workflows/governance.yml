name: Governance

on:
  pull_request:

permissions:
  contents: read

jobs:
  advisory:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/codex-governance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
      - name: Validate local governance configuration
        run: |
          mkdir -p governance-artifacts
          go run ./cmd/codex-governance config check
          if [[ -f governance/work-item.json && -f governance/offline-export.json ]]; then
            go run ./cmd/codex-governance validate-work-item \
              --work-item governance/work-item.json \
              --offline-export governance/offline-export.json \
              --base-sha "${{ github.event.pull_request.base.sha }}" \
              --head-sha "${{ github.event.pull_request.head.sha }}"
            work_item_status="passed"
          else
            work_item_status="skipped (no local offline fixture)"
          fi
          {
            echo "## Governance"
            echo
            echo "- Configuration: valid"
            echo "- Work-item validation: ${work_item_status}; no Jira read or write performed"
            echo "- Review budgets: advisory mode"
          } | tee governance-artifacts/summary.txt >> "$GITHUB_STEP_SUMMARY"
          {
            echo "Configuration: valid"
            echo "Work-item validation: ${work_item_status}"
            echo "Review budgets: advisory mode"
            echo "No Jira read or write performed"
          } > governance-artifacts/summary.txt
      - name: Upload redacted governance summary
        uses: actions/upload-artifact@v7
        with:
          name: governance-summary
          path: tools/codex-governance/governance-artifacts/summary.txt
          retention-days: 14
